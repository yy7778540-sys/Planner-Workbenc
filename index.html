<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存计划工作台 · 交互原型 v6.0</title>
<style>
/* ==========================================================
   计划员工作台 v6 · 优化版
   Design System: Tailwind-inspired palette, clean & professional
   ========================================================== */

/* ----- 设计变量 ----- */
:root {
  --p: #2563eb; --pl: #eff6ff; --pm: #1d4ed8;
  --d: #dc2626; --dl: #fef2f2;
  --w: #b45309; --wl: #fffbeb;
  --s: #15803d; --sl: #f0fdf4;
  --pu: #6d28d9; --pul: #f5f3ff;
  --g50: #f8fafc; --g100: #e5e7eb; --g200: #d1d5db;
  --g400: #9ca3af; --g600: #4b5563; --g800: #1f2937;
  --tx: #111827; --ts: #4b5563; --th: #6b7280; --tl: #9ca3af;
  --br: #e5e7eb; --brm: #d1d5db;
  --r: 6px; --rl: 8px;
  --sh-sm: 0 1px 2px rgba(17,24,39,.05);
  --sh-md: 0 1px 3px rgba(17,24,39,.08), 0 1px 2px rgba(17,24,39,.04);
  --sh-lg: 0 4px 12px rgba(17,24,39,.08);
  --sh-xl: 0 8px 24px rgba(17,24,39,.10);
  --t-fast: .12s ease;
  --t-base: .18s ease;
  --t-slow: .25s cubic-bezier(.4,0,.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 14px;
  color: var(--tx);
  background: #f9fafb;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ----- 顶栏 ----- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff;
  border-bottom: 1px solid var(--br);
  display: flex; align-items: center;
  padding: 0 20px; height: 46px; gap: 0;
}
.tb-logo {
  font-size: 15px; font-weight: 600;
  color: var(--tx); margin-right: 24px; white-space: nowrap;
  letter-spacing: -.01em;
}
.tb-role {
  height: 46px; display: flex; align-items: center;
  padding: 0 16px; font-size: 13px; color: var(--ts);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color var(--t-base), border-color var(--t-base);
}
.tb-role:hover { color: var(--tx); }
.tb-role.on { color: var(--tx); font-weight: 600; border-bottom-color: var(--tx); }

/* ----- 页面容器 ----- */
.page {
  padding: 14px 20px 40px;
  max-width: 1280px; margin: 0 auto;
}

/* ----- 面包屑 ----- */
.brd {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  background: transparent;
  border: 1px solid var(--br);
  border-radius: var(--r);
  margin-bottom: 16px; font-size: 12px; flex-wrap: wrap;
  color: var(--ts);
}

/* ----- KPI 行卡片 ----- */
.kpi-row { display: grid; gap: 8px; margin-bottom: 12px; }
.kpi-row.col5 { grid-template-columns: repeat(5, 1fr); }
.kpi-row.col4 { grid-template-columns: repeat(4, 1fr); }
.kpi-row.col3 { grid-template-columns: repeat(3, 1fr); }
.kpi-row.col2 { grid-template-columns: repeat(2, 1fr); }

.kc {
  background: #fff; border-radius: var(--r);
  padding: 12px 14px;
  border: 1px solid var(--br);
  cursor: pointer;
  transition: border-color var(--t-base), box-shadow var(--t-base);
  position: relative;
  box-shadow: var(--sh-sm);
}
.kc:hover {
  border-color: var(--tx);
  box-shadow: var(--sh-md);
}
.kc:active { transform: translateY(0.5px); }
.kc.sel {
  border: 2px solid var(--tx);
  box-shadow: 0 0 0 3px rgba(0,0,0,.08);
}
.kc-l { font-size: 11px; color: var(--th); margin-bottom: 4px; font-weight: 500; }
.kc-v { font-size: 22px; font-weight: 600; line-height: 1.15; letter-spacing: -.01em; }
.kc-t { font-size: 11px; color: var(--th); margin-top: 3px; line-height: 1.3; }
.kc-dash { font-size: 11px; color: var(--th); margin-top: 3px; line-height: 1.3; }
.kc-r { background: #fef2f2; }
.kc-o { background: #fffbeb; }
.kc-b { background: #eff6ff; }
.kc-g { background: #f0fdf4; }
.kc-u { background: #f5f3ff; }
.kc .drill-tag {
  display: inline-block; font-size: 9px;
  background: var(--tx); color: #fff;
  padding: 2px 6px; border-radius: 4px; margin-top: 4px;
  font-weight: 500;
}

/* ----- 紧凑型业务卡片 ----- */
.biz-card { padding: 10px 12px; overflow: hidden; }
.biz-card .biz-hd {
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px; margin-bottom: 4px;
}
.biz-card .biz-title { font-size: 11px; color: var(--th); font-weight: 500; }
.biz-card .biz-mom {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; padding: 2px 6px;
  border-radius: 4px; white-space: nowrap;
}
.biz-card .biz-mom.up { background: #fef2f2; color: #dc2626; }
.biz-card .biz-mom.down { background: #f0fdf4; color: #15803d; }
.biz-card .biz-hero {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 6px; margin-bottom: 4px;
}
.biz-card .biz-kpi {
  font-size: 22px; font-weight: 700; color: var(--tx);
  line-height: 1.1; letter-spacing: -.01em;
}
.biz-card .biz-sub { font-size: 11px; color: var(--ts); line-height: 1.4; margin-bottom: 2px; }
.biz-card .biz-sub span { color: var(--th); }
.biz-card .biz-sub .v { color: var(--tx); font-weight: 500; }
.biz-card .biz-sub .r { color: var(--d); }
.biz-card .biz-sub .g { color: var(--s); }
.biz-card .biz-sub .o { color: var(--w); }

/* ----- SPU 卡片 ----- */
.spu-card {
  background: linear-gradient(135deg, #fff 0%, #f8fbff 58%, #eef6ff 100%);
  border-left: 3px solid var(--tx);
}
.spu-card:hover {
  border-color: var(--tx);
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
}

.spu-drawer-hero {
  background: linear-gradient(135deg, #f8fbff, #fff);
  border: 1px solid rgba(37,99,235,.16);
  border-radius: var(--r);
  padding: 16px; margin-bottom: 12px;
}
.spu-drawer-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
}
.spu-drawer-title { font-size: 12px; color: var(--th); margin-bottom: 2px; }
.spu-drawer-value {
  font-size: 28px; font-weight: 700; line-height: 1.15; color: var(--tx);
  letter-spacing: -.01em;
}
.spu-drawer-mom {
  background: var(--s); color: #fff;
  border-radius: 999px; padding: 4px 10px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.spu-dim-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin: 12px 0;
}
.spu-dim-card {
  background: #fff;
  border: 1px solid var(--br); border-radius: var(--r);
  padding: 10px; cursor: pointer;
  transition: border-color var(--t-base), background var(--t-base);
}
.spu-dim-card:hover { border-color: var(--tx); background: var(--g50); }
.spu-dim-card span { display: block; font-size: 11px; color: var(--th); }
.spu-dim-card strong {
  display: block; font-size: 18px; color: var(--tx); margin-top: 2px;
}
.spu-bar-row {
  display: grid;
  grid-template-columns: 72px 1fr 52px;
  align-items: center; gap: 8px; margin: 8px 0; font-size: 12px;
}
.spu-bar-track {
  height: 8px; background: var(--g50); border-radius: 999px; overflow: hidden;
}
.spu-bar-fill { height: 100%; background: var(--tx); border-radius: 999px; }
.spu-section {
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 14px; margin-bottom: 12px;
}
.spu-section .sec-tt { margin-bottom: 8px; }

/* ----- 待办网格 ----- */
.todo-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 16px;
}
.tc {
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 14px;
  cursor: pointer;
  transition: border-color var(--t-base), box-shadow var(--t-base);
  box-shadow: var(--sh-sm);
}
.tc:hover { border-color: var(--tx); box-shadow: var(--sh-md); }
.tc:active { transform: translateY(0.5px); }
.tc.done { opacity: .55; }
.tc.r { border-left: 3px solid var(--d); }
.tc.o { border-left: 3px solid var(--w); }
.tc.b { border-left: 3px solid var(--tx); }
.tc.gr { border-left: 3px solid var(--g200); }
.tc-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.tc-title { font-size: 13px; font-weight: 600; }
.tc-num { font-size: 24px; font-weight: 600; margin-bottom: 3px; letter-spacing: -.01em; }
.tc-meta { font-size: 11px; color: var(--th); margin-bottom: 6px; }
.tc-link { font-size: 11px; color: var(--tx); font-weight: 500; }

/* ----- 计划员左右布局 ----- */
.planner-split { display: flex; gap: 14px; margin-bottom: 14px; }
.planner-left { flex: 1; min-width: 0; }
.planner-right { flex: 1; min-width: 0; }
.planner-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding: 8px 12px;
  background: var(--g50); border-radius: var(--r);
}
.planner-panel-header .ph-title {
  font-size: 15px; font-weight: 600; color: var(--pu);
}
.planner-panel-header .ph-count {
  font-size: 13px; color: var(--pu);
}
.planner-panel-header .ph-count em {
  font-style: normal; color: var(--d); font-weight: 600;
}

.planner-todo-list {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.planner-data-list {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* ----- 计划统一卡片 ----- */
.plan-card {
  display: flex; flex-direction: column;
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 14px 16px 12px;
  cursor: pointer; position: relative; overflow: hidden;
  min-height: 110px;
  transition: border-color var(--t-base), box-shadow var(--t-base);
  box-shadow: var(--sh-sm);
}
.plan-card:hover { border-color: var(--tx); box-shadow: var(--sh-md); }
.plan-card:active { transform: translateY(0.5px); }
.plan-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: var(--r) 0 0 var(--r);
}
.plan-card.urgent::before { background: var(--d); }
.plan-card.normal::before { background: var(--tx); }
.plan-card .pc-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px; flex-shrink: 0;
}
.plan-card .pc-title { font-size: 16px; font-weight: 600; color: var(--pu); }
.plan-card .pc-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 700; padding: 4px 12px;
  border-radius: var(--r); white-space: nowrap;
  box-shadow: var(--sh-sm);
}
.plan-card .pc-badge.urgent { background: #fef2f2; color: #dc2626; }
.plan-card .pc-badge.up { background: #fef2f2; color: #dc2626; }
.plan-card .pc-badge.down { background: #f0fdf4; color: #15803d; }
.plan-card .pc-kpi {
  font-size: 32px; font-weight: 700; color: var(--pu);
  line-height: 1.15; margin-bottom: 4px; flex-shrink: 0;
  letter-spacing: -.02em;
}
.plan-card .pc-meta {
  font-size: 12px; color: var(--pu); line-height: 1.4;
  margin-bottom: 6px; flex: 1; min-height: 0;
}
.plan-card .pc-meta .r { color: var(--d); }
.plan-card .pc-link {
  font-size: 12px; color: var(--pu);
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0; margin-top: auto; font-weight: 500;
}
.plan-card .pc-link .arrow { color: var(--pu); }

/* ----- 行内可展开区域 ----- */
.inline-section { margin-bottom: 16px; }
.inline-section .is-hd {
  display: flex; align-items: center; justify-content: space-between;
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 16px 18px;
  cursor: pointer;
  transition: border-color var(--t-base), box-shadow var(--t-base);
  box-shadow: var(--sh-sm);
}
.inline-section .is-hd:hover { border-color: var(--tx); box-shadow: var(--sh-md); }
.inline-section .is-hd.l { border-left: 4px solid var(--d); }
.inline-section .is-hd.n { border-left: 4px solid var(--w); }
.inline-section .is-title { font-size: 14px; font-weight: 600; }
.inline-section .is-arrow {
  font-size: 16px; color: var(--tl);
  transition: transform var(--t-base); margin-left: 8px;
}
.inline-section .is-arrow.open { transform: rotate(180deg); }
.inline-section .is-meta { font-size: 12px; color: var(--ts); margin-top: 2px; }
.inline-section .is-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 12px; font-weight: 500; margin-left: 10px;
}
.inline-section .is-badge.r { background: #fef2f2; color: #dc2626; }
.inline-section .is-badge.o { background: #fffbeb; color: #b45309; }
.inline-section .is-body {
  display: none; margin-top: 10px; padding: 16px;
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r);
  box-shadow: var(--sh-sm);
}
.inline-section .is-body.open { display: block; }

/* ----- 快捷按钮行 ----- */
.quick-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}
.qc {
  padding: 14px 16px; border-radius: var(--r);
  cursor: pointer;
  transition: box-shadow var(--t-base), transform var(--t-fast);
  border: 1px solid transparent;
}
.qc:hover { box-shadow: var(--sh-md); }
.qc:active { transform: translateY(0.5px); }
.qc-red { background: #fef2f2; border-color: rgba(220,38,38,.18); }
.qc-ora { background: #fffbeb; border-color: rgba(180,83,9,.18); }
.qc-tt { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.qc-tt.r { color: var(--d); }
.qc-tt.o { color: var(--w); }
.qc-num { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
.qc-desc { font-size: 12px; color: var(--th); }

/* ----- 表格 ----- */
.tbl {
  width: 100%; border-collapse: separate; border-spacing: 0;
  font-size: 13px; background: #fff;
  border-radius: var(--r);
  border: 1px solid var(--br);
  margin-bottom: 16px;
  overflow: hidden;
}
.tbl th {
  background: #f9fafb; padding: 10px 12px; text-align: left;
  font-weight: 600; color: #374151;
  border-bottom: 1px solid var(--brm);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
  font-size: 12px; letter-spacing: .01em;
}
.tbl td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--br);
  color: var(--tx); vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.clickable { cursor: pointer; }
.tbl tr.clickable:hover { background: #f9fafb; }
.tbl tr.clickable:hover td:first-child { color: var(--tx); font-weight: 500; }
.tbl tr.lvl2 td { background: #fafafa; }
.tbl tr.lvl3 td { background: #f5f5f5; }
.tbl tr.lvl2.clickable:hover td,
.tbl tr.lvl3.clickable:hover td { background: #f9fafb; }
.tbl .gr td { background: var(--g50); color: var(--tx); font-weight: 500; }
.tbl .chk-col { width: 36px; text-align: center; }

/* ----- 双列网格 ----- */
.row2 {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}

/* ----- 药丸标签 ----- */
.pill {
  display: inline-block; padding: 2px 10px;
  border-radius: 999px; font-size: 11px; font-weight: 500;
}
.pr { background: #fef2f2; color: #dc2626; }
.po { background: #fffbeb; color: #b45309; }
.pb { background: #eff6ff; color: #2563eb; }
.pg { background: #f0fdf4; color: #15803d; }
.ppu { background: #f5f3ff; color: #6d28d9; }
.pgr { background: #f8fafc; color: #4b5563; }
.red { color: var(--d); }
.ora { color: var(--w); }
.grn { color: var(--s); }
.blu { color: var(--tx); }

.tag {
  display: inline-block; padding: 2px 10px;
  border-radius: 999px; font-size: 11px; font-weight: 500;
}
.tb { background: #eff6ff; color: #2563eb; }
.tr { background: #fef2f2; color: #dc2626; }
.to { background: #fffbeb; color: #b45309; }
.tg { background: #f0fdf4; color: #15803d; }

/* ----- 按钮 ----- */
.btn {
  display: inline-block; padding: 6px 14px;
  border-radius: var(--r); font-size: 12px;
  cursor: pointer; border: none;
  font-weight: 500;
  transition: background var(--t-base), box-shadow var(--t-base), transform var(--t-fast);
}
.btn:active { transform: translateY(0.5px); }
.btn-pri { background: #111827; color: #fff; }
.btn-pri:hover { background: #374151; }
.btn-sec {
  background: #fff; color: #111827;
  border: 1px solid var(--brm);
}
.btn-sec:hover { background: #f9fafb; }
.btn-ghost {
  background: transparent; color: var(--ts);
  border: 1px solid var(--br);
}
.btn-ghost:hover { background: #f9fafb; }
.btn-sm { padding: 3px 10px; font-size: 11px; }

/* ----- 章节标题 ----- */
.sec-tt {
  font-size: 13px; font-weight: 600; color: var(--tx);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}

/* ----- 抽屉 ----- */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(17,24,39,.22);
  z-index: 200;
  animation: fadeIn .2s;
}
.drawer {
  position: fixed; top: 0; right: -480px;
  width: 460px; height: 100%;
  background: #fff; z-index: 201;
  transition: right var(--t-slow);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 28px rgba(17,24,39,.08);
}
.drawer.open { right: 0; }
.drawer-overlay.open { display: block; }
.drawer-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--br); flex-shrink: 0;
}
.drawer-hd .title { font-size: 14px; font-weight: 600; }
.drawer-close {
  width: 28px; height: 28px; border: none;
  background: var(--g50); border-radius: 50%;
  cursor: pointer; font-size: 14px; color: var(--ts);
  display: flex; align-items: center; justify-content: center;
  transition: background var(--t-base);
}
.drawer-close:hover { background: var(--g100); }
.drawer-bd { flex: 1; overflow-y: auto; padding: 16px; }
.drawer-ft {
  display: none; padding: 12px 16px;
  border-top: 1px solid var(--br); background: var(--g50); gap: 8px;
}

/* ----- Toast ----- */
.toast-wrap {
  position: fixed; top: 64px; right: 20px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 18px; border-radius: var(--r);
  font-size: 13px; color: #fff;
  animation: slideIn .3s ease;
  max-width: 360px;
  box-shadow: var(--sh-lg);
}
.toast.s { background: var(--s); }
.toast.w { background: var(--w); }
.toast.e { background: var(--d); }
.toast.i { background: var(--tx); }

/* ----- 模态框 ----- */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(17,24,39,.4); z-index: 250;
  animation: fadeIn .2s;
}
.modal-overlay.open { display: flex; align-items: center; justify-content: center; }
.modal {
  background: #fff; border-radius: var(--rl);
  padding: 24px; min-width: 360px; max-width: 500px;
  box-shadow: 0 20px 60px rgba(17,24,39,.16);
}
.modal .title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal .body {
  font-size: 13px; color: var(--ts);
  margin-bottom: 18px; line-height: 1.7;
}
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ----- Tabs ----- */
.tabs {
  display: flex; gap: 0; margin-bottom: 12px;
  background: var(--g50); border-radius: var(--r); padding: 3px;
}
.tab-item {
  padding: 6px 18px; border-radius: var(--r);
  font-size: 12px; cursor: pointer; color: var(--ts);
  transition: all var(--t-base);
}
.tab-item:hover { color: var(--tx); }
.tab-item.on {
  background: #fff; color: var(--tx); font-weight: 600;
  box-shadow: var(--sh-sm);
}

/* ----- 加载条 ----- */
.load-bar {
  height: 2px; background: var(--pm);
  position: fixed; top: 46px; left: -100%; width: 50%; z-index: 150;
  transition: none;
}
.load-bar.running { animation: loadBar 1.2s ease infinite; }
@keyframes loadBar {
  0%   { left: -50%; width: 30%; }
  50%  { left: 20%;  width: 50%; }
  100% { left: 100%; width: 10%; }
}
@keyframes fadeIn   { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideIn  {
  from { opacity: 0; transform: translateX(20px) }
  to   { opacity: 1; transform: translateX(0) }
}

/* ----- 迷你柱状图 ----- */
.mini-bar { display: flex; align-items: flex-end; gap: 2px; height: 32px; }
.mini-bar .b {
  flex: 1; border-radius: 2px 2px 0 0; min-width: 3px;
}

/* ----- 轻型Tabs ----- */
.lt-tabs {
  display: inline-flex; gap: 0; margin-bottom: 0;
  background: var(--g50); border-radius: var(--r); padding: 3px;
}
.lt-tab-item {
  padding: 6px 18px; border-radius: var(--r);
  font-size: 13px; cursor: pointer; color: var(--ts);
  transition: all var(--t-base); font-weight: 500;
}
.lt-tab-item:hover { color: var(--tx); }
.lt-tab-item.on {
  background: #fff; color: var(--tx); font-weight: 600;
  box-shadow: var(--sh-sm);
}

/* ----- 分割线 ----- */
.divider { height: 1px; background: var(--brm); margin: 18px 0; }

/* ----- 响应式 ----- */
@media (max-width: 900px) {
  .todo-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-row.col5 { grid-template-columns: repeat(3, 1fr); }
  .kpi-row.col4 { grid-template-columns: repeat(2, 1fr); }
  .row2 { grid-template-columns: 1fr; }
  .quick-row { grid-template-columns: 1fr; }
  .planner-split { flex-direction: column; }
  .planner-left { flex: auto; }
}

/* ==========================================================
   大类别卡片
   ========================================================== */
.metric-group { margin-bottom: 12px; }

.cat-box {
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 0;
  margin-bottom: 10px; overflow: hidden;
  transition: border-color var(--t-base);
  box-shadow: var(--sh-sm);
}
.cat-box:hover { border-color: var(--brm); }
.cat-box .cb-hd { display: flex; align-items: center; gap: 10px; padding: 14px 16px 8px; }
.cat-box .cb-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--tx); color: #fff;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.cat-box .cb-title { font-size: 14px; font-weight: 600; color: var(--tx); }
.cat-box .cb-sub { font-size: 11px; color: var(--th); margin-left: 4px; }
.cat-box .cb-body { padding: 0 16px 12px; }
.cat-box .cb-metrics { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-box .cb-m {
  flex: 1; min-width: 130px;
  background: var(--g50); border-radius: var(--r);
  padding: 10px 14px;
}
.cat-box .cb-m .cb-ml { font-size: 11px; color: var(--th); margin-bottom: 2px; }
.cat-box .cb-m .cb-mv { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
.cat-box .cb-m .cb-mt { font-size: 10px; color: var(--th); margin-top: 2px; }
.cat-box .cb-links { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
.cat-box .cb-link {
  display: inline-block; padding: 4px 12px;
  background: var(--g50); color: var(--tx);
  border-radius: 14px; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all var(--t-base);
}
.cat-box .cb-link:hover { background: var(--tx); color: #fff; }

/* ==========================================================
   绩效面板
   ========================================================== */
.perf-panel { align-items: start; }
.perf-box {
  background: #fff; border: 1px solid var(--br);
  border-radius: var(--r); padding: 14px;
  box-shadow: var(--sh-sm);
}
.perf-hd {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px;
}
.perf-hd span { font-size: 13px; font-weight: 600; color: var(--tx); }
.perf-hd em { font-style: normal; font-size: 12px; color: var(--th); }
.weight-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; border-bottom: 1px solid var(--br);
  padding: 9px 0;
}
.weight-row:first-of-type { padding-top: 0; }
.weight-row strong { display: block; font-size: 12px; color: var(--tx); font-weight: 600; }
.weight-row span { display: block; font-size: 11px; color: var(--th); margin-top: 1px; }
.weight-row label { font-size: 12px; color: var(--ts); white-space: nowrap; }
.weight-row input {
  width: 48px; border: 1px solid var(--br);
  border-radius: 4px; padding: 2px 6px;
  text-align: center; font-size: 12px; margin: 0 4px;
  outline: none; transition: border-color var(--t-base);
}
.weight-row input:focus { border-color: var(--tx); box-shadow: 0 0 0 2px rgba(0,0,0,.08); }
.perf-box .btn { margin-top: 10px; }
.perf-rank { margin-bottom: 0; }

.weight-modal-note { font-size: 12px; color: var(--th); margin-bottom: 8px; }
.modal-weight-row { padding: 10px 0; }
.modal-weight-row:last-child { border-bottom: none; }

/* ==========================================================
   工厂维度展开行
   ========================================================== */
.factory-child { display: none; background: rgba(102,126,234,0.04) !important; }
.factory-child td {
  padding: 6px 10px 6px 52px !important;
  font-size: 12px !important; color: var(--ts) !important;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.factory-parent { cursor: pointer; }
.factory-parent:hover { background: rgba(102,126,234,0.08) !important; }
.factory-arrow {
  display: inline-block; width: 14px; text-align: center;
  transition: transform var(--t-base); font-size: 10px; color: var(--tx);
}
.factory-expand-bar {
  text-align: right; padding: 6px 10px;
  background: var(--pl); border-top: 1px dashed var(--br);
  font-size: 11px; color: var(--th);
}

/* ==========================================================
   报表跳转按钮
   ========================================================== */
.btn-report {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 4px 10px;
  background: var(--tx); color: #fff; border: none;
  border-radius: 4px; cursor: pointer; white-space: nowrap;
  font-weight: 500; transition: opacity var(--t-base);
}
.btn-report:hover { opacity: 0.85; }
.btn-report-sm { font-size: 11px; padding: 3px 8px; }
.jump-bar {
  display: flex; justify-content: flex-end; gap: 6px;
  padding: 8px 10px 0;
  background: var(--pl); border-radius: 0 0 var(--r) var(--r);
}

/* ==========================================================
   区域维度 Tab & 树状行
   ========================================================== */
.region-row {
  cursor: pointer; font-weight: 600;
  background: rgba(37,99,235,0.04);
  border-left: 3px solid var(--tx);
  transition: background var(--t-base);
}
.region-row:hover { background: rgba(37,99,235,0.10) !important; }
.region-row td { padding: 10px 12px !important; font-size: 13px !important; }
.region-row td:first-child { padding-left: 10px !important; }

.view-switch { display: flex; gap: 6px; }
.view-switch label {
  cursor: pointer; font-size: 11px; color: var(--ts);
  display: flex; align-items: center; gap: 3px;
  padding: 3px 10px; border-radius: 12px;
  border: 1px solid var(--br);
  transition: all var(--t-base); white-space: nowrap;
}
.view-switch label:hover { background: var(--g50); color: var(--tx); }
.view-switch input[type=radio] { accent-color: var(--tx); margin: 0; width: 12px; height: 12px; }
.view-switch label:has(input:checked) {
  background: var(--g50); color: var(--tx);
  border-color: var(--tx); font-weight: 500;
}

.tree-arrow {
  display: inline-block; width: 14px; text-align: center;
  transition: transform var(--t-base); font-size: 9px;
  color: var(--tx); vertical-align: middle;
  cursor: pointer; user-select: none;
}
.tree-arrow.expanded { transform: rotate(90deg); }

.tree-region-row { cursor: pointer; user-select: none; font-weight: 500; }
.tree-region-row:hover { background: var(--pl) !important; }

.tree-city-row { display: none; background: rgba(37,99,235,0.02); }
.tree-city-row.show { display: table-row; }
.tree-city-row:hover { background: rgba(37,99,235,0.06) !important; }
.tree-city-row td:first-child { padding-left: 28px !important; }
.tree-city-row td:first-child .tree-arrow { margin-right: 2px; }

.tree-factory-row {
  display: none; background: rgba(102,126,234,0.025);
  font-size: 12px; color: var(--ts);
}
.tree-factory-row.show { display: table-row; }
.tree-factory-row:hover { background: rgba(102,126,234,0.05) !important; }
.tree-factory-row td:first-child { padding-left: 46px !important; }

.region-tag {
  display: inline-block; font-size: 9px;
  color: var(--th); margin-left: 2px; padding: 0 4px;
  background: var(--g50); border-radius: 3px;
}

.planner-tree-row,
.customer-tree-row { cursor: pointer; user-select: none; font-weight: 500; }
.planner-tree-row:hover,
.customer-tree-row:hover { background: var(--pl) !important; }

.planner-factory-row,
.customer-factory-row {
  display: none; background: rgba(37,99,235,0.02);
  font-size: 12px; color: var(--ts);
}
.planner-factory-row.show,
.customer-factory-row.show { display: table-row; }
.planner-factory-row:hover,
.customer-factory-row:hover { background: rgba(37,99,235,0.05) !important; }
.planner-factory-row td:first-child,
.customer-factory-row td:first-child { padding-left: 28px !important; }

</style>

<script>
/* ===== UTILITY ===== */
function _(sel){return document.querySelector(sel);}
function $$(sel){return document.querySelectorAll(sel);}
function toast(msg,level){level=level||'i';var w=_('#toasts'),e=document.createElement('div');e.className='toast '+level;e.textContent=msg;w.appendChild(e);setTimeout(function(){e.remove();},2500);}
function simLoad(fn){var b=_('#loadBar');b.classList.add('running');setTimeout(function(){b.classList.remove('running');fn();},400);}
function showModal(title,body,onConfirm,confirmLabel){confirmLabel=confirmLabel||'确认';var m=_('#modal'),ov=_('#modalOverlay');m.innerHTML='<div class="title">'+title+'</div><div class="body">'+body+'</div><div class="actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-pri" id="modalConfirm">'+confirmLabel+'</button></div>';ov.classList.add('open');_('#modalConfirm').onclick=function(){closeModal();if(onConfirm)onConfirm();};}
function closeModal(){_('#modalOverlay').classList.remove('open');}
function openDrawer(title,bodyHtml,footerHtml){_('#drawerTitle').textContent=title;_('#drawerBody').innerHTML=bodyHtml;_('#drawerFt').innerHTML=footerHtml||'';_('#drawerFt').style.display=footerHtml?'flex':'none';_('#drawer').classList.add('open');_('#drawerOverlay').classList.add('open');}
function closeDrawer(){_('#drawer').classList.remove('open');_('#drawerOverlay').classList.remove('open');}
function pill(txt,cls){return '<span class="pill '+cls+'">'+txt+'</span>';}

/* ===== ROLES ===== */
function switchRole(role){
  S.role=role;S.planner.kpiDrill=null;S.planner.todoFilter=null;
  S.planner.view='home';S.planner.turnover.drill=null;S.planner.dull.drill=null;S.planner.dull.tab='dull';
  S.planner.dullExpanded=false;S.planner.nearExpanded=false;S.planner.inlineTab='dull';
  S.supervisor.orgExpanded={};S.supervisor.cityExpanded={};closeDrawer();
  $$('.tb-role').forEach(function(e){e.classList.toggle('on',e.id==='role-'+role);});
  renderMain();window.location.hash='#'+role;
}

/* ===== renderMain ===== */
function renderMain(){
  var h='';
  if(S.role==='planner'){
    if(S.planner.kpiDrill){h=renderKpiDrill();}else{
      var dr=S.planner.turnover.drill;
      if(dr){h=renderTurnoverDrill();}else if(S.planner.dull.drill){h=renderDullDrill();}else if(S.planner.view==='dull'){h=renderDullHome();}else{h=renderPlannerHome();}
    }
  }else if(S.role==='leader'){h=renderLeaderHome();}else{h=renderSupervisorHome();}
  _('#mainContent').innerHTML=h;updateHash();
}
function updateHash(){
  var parts=[S.role];
  if(S.planner.kpiDrill)parts.push('kpiDrill',S.planner.kpiDrill);
  if(S.planner.turnover.drill)parts.push('turnover',encodeURIComponent(JSON.stringify(S.planner.turnover.drill)));
  window.location.hash=parts.join('_');
}


/* ===== PLANNER HOME (v6: inline expandable 呆滞临期) ===== */
function renderPlannerHome(){
  var todoCount=DB.todos.filter(function(t){return!t.done;}).length;
  var h='';

  /* Header */
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
  h+='<div><span style="font-size:18px;font-weight:700;color:var(--d);">'+todoCount+'待办事项</span><div style="font-size:12px;color:var(--th);margin-top:2px;">数据更新时间: 今日09:30</div></div></div>';

  /* ===== Left-Right Split: 今日待办 | 数据分析 ===== */
  h+='<div class="planner-split">';

  /* ---- LEFT: 今日待办 ---- */
  h+='<div class="planner-left">';
  h+='<div class="planner-panel-header"><span class="ph-title">今日待办</span><span class="ph-count">共 <em>'+todoCount+'</em> 项</span></div>';
  h+='<div class="planner-todo-list">';
  var todoLinkMap={replenish:'处理补货建议',newproduct:'处理新品备货',transconfirm:'处理调拨确认',transapply:'处理调拨申请',openalert:'处理异常预警'};
  DB.todos.filter(function(t){return!t.done;}).forEach(function(t){
    var cardCls=t.urgent?'urgent':'normal';
    var badgeHtml=t.urgent?'<span class="pc-badge urgent">紧急</span>':'';
    h+='<div class="plan-card '+cardCls+'" onclick="openPlannerTodo(\''+t.type+'\',\''+t.id+'\')" title="'+t.desc+'">';
    h+='<div class="pc-hd"><span class="pc-title">'+t.title+'</span>'+badgeHtml+'</div>';
    h+='<div class="pc-kpi">'+t.count+'</div>';
    h+='<div class="pc-link"><span class="arrow">›</span> 点击 → '+todoLinkMap[t.type]+'</div>';
    h+='</div>';
  });
  h+='</div></div>';

  /* ---- RIGHT: 数据分析 ---- */
  h+='<div class="planner-right">';
  h+='<div class="planner-panel-header"><span class="ph-title">数据分析</span><span class="ph-count">5项核心指标</span></div>';
  h+='<div class="planner-data-list">';
  DB.plannerData.forEach(function(d){
    var momCls=d.momUp?'up':'down';
    var momArrow=d.momUp?'↗':'↘';
    h+='<div class="plan-card normal" onclick="openPlannerDataDrill(\''+d.key+'\')" title="点击查看'+d.title+'明细">';
    h+='<div class="pc-hd"><span class="pc-title">'+d.title+'</span><span class="pc-badge '+momCls+'">'+momArrow+' '+d.mom+'</span></div>';
    h+='<div class="pc-kpi">'+d.kpi+'</div>';
    h+='<div class="pc-meta">'+d.sub+'</div>';
    h+='<div class="pc-link"><span class="arrow">›</span> 点击 → 查看明细</div>';
    h+='</div>';
  });
  h+='</div></div>';

  h+='</div>'; /* close planner-split */

  /* 优先待办明细表格 (unchanged) */
  h+='<div class="sec-tt">优先待办明细</div>';
  h+='<table class="tbl"><thead><tr><th>商品/SKU</th><th>仓库</th><th>类型</th><th>紧急程度</th><th>截止时间</th><th>操作</th></tr></thead><tbody>';
  DB.todoItems.forEach(function(it){
    var uCls=it.urgent==='紧急'?'pr':it.urgent==='关注'?'po':'pb';
    var actCls=it.actionType==='d'?'pr':'po';
    h+='<tr>';

function openPlannerTodo(type, tid){
  var todoData={
    'replenish':{title:'商品订货建议 — 供应商维度',desc:'按供应商拆分的补货建议列表',supplierDrill:true},

    'transapply':{title:'调拨申请处理',desc:'各仓调拨申请列表'},
    'openalert':{title:'开货异常预警 — 工厂物料维度',desc:'计划员工厂物料维度异常确认',factoryConfirm:true}
  };
  var td=todoData[type];
  if(!td) return;

  /* 商品订货建议：支持供应商/工厂维度下钻，区分采购和调拨 */
  if(type==='replenish'){
    var html='';
    html+='<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px;">';
    html+='<button class="btn btn-ghost btn-sm" onclick="renderReplenishDefault()">全部列表</button>';

    html+='<button class="btn btn-ghost btn-sm" onclick="renderReplenishTransfer()">按调出-调入工厂维度（调拨）</button>';
    html+='</div>';
    html+='<div id="replenishContent"></div>';
    openDrawer(td.title,html,'<button class="btn btn-ghost btn-sm" onclick="closeDrawer()">关闭</button>');
    renderReplenishDefault();
    return;
  }

  /* 开货异常预警：工厂物料确认 */
  if(type==='openalert'){
    var items=[{code:'MAT001',name:'原料A-高纯度级',factory:'华东工厂',alert:'库存不足',level:'紧急'},
      {code:'MAT002',name:'原料B-食品级',factory:'华北工厂',alert:'品质异常',level:'关注'},

      {code:'MAT004',name:'原料C-医药级',factory:'西南工厂',alert:'库存不足',level:'关注'},
      {code:'MAT005',name:'辅料A-防潮型',factory:'华东工厂',alert:'价格波动',level:'普通'}];
    var html='<table class="tbl"><thead><tr><th>物料编码</th><th>物料名称</th><th>工厂</th><th>异常类型</th><th>等级</th><th>操作</th></tr></thead><tbody>';
    items.forEach(function(m,i){
      var lvlCls=m.level==='紧急'?'pr':m.level==='关注'?'po':'pb';
      html+='<tr><td>'+m.code+'</td><td style="font-weight:500;">'+m.name+'</td><td>'+m.factory+'</td>';
      html+='<td>'+m.alert+'</td><td>'+pill(m.level,lvlCls)+'</td>';
      html+='<td><button class="btn btn-sm btn-pri" onclick="event.stopPropagation();confirmOpenAlert(\''+m.code+'\')">确认处理</button></td></tr>';
    });
    html+='</tbody></table>';
    openDrawer(td.title,html,'<button class="btn btn-ghost btn-sm" onclick="closeDrawer()">关闭</button>');
    return;
  }

  /* 转储调拨确认：物料级确认/审核/替换/修改数量 */
  if(type==='transconfirm'){
    renderTransconfirmDrawer();
    return;
  }

  /* 调拨申请处理：表格式确认/退回/日志 */
  if(type==='transapply'){
    renderTransapplyDrawer();
    return;
  }

  /* 新品备货：物料级确认/作废/提交 */
  if(type==='newproduct'){
    renderNewproductDrawer();
    return;
  }

  /* 通用待办明细 */
  var items=DB.todoItems.slice(0,5);
  var html='<table class="tbl"><thead><tr><th>商品</th><th>仓库</th><th>紧急程度</th><th>截止</th><th>操作</th></tr></thead><tbody>';

    var uCls=it.urgent==='紧急'?'pr':'po';
    html+='<tr><td><span style="font-weight:500;">'+it.name+'</span><span style="display:block;font-size:11px;color:var(--th);">'+it.code+'</span></td>';
    html+='<td>'+it.warehouse+'</td><td>'+pill(it.urgent,uCls)+'</td>';
    html+='<td style="'+(it.urgent==='紧急'?'color:var(--d);':'')+'">'+it.deadline+'</td>';
    html+='<td><button class="btn btn-sm btn-pri" onclick="event.stopPropagation();processSingleTodo(\''+it.id+'\')">处理</button></td></tr>';
  });
  html+='</tbody></table>';
  openDrawer(td.title,html,'<button class="btn btn-ghost btn-sm" onclick="closeDrawer()">关闭</button>');
}

/* 商品订货建议：按供应商维度（采购） */
function renderReplenishSupplier(){
  var purch=replenishData.filter(function(m){return m.type==='采购';});
  var groups={};
  purch.forEach(function(m){
    if(!groups[m.supplier]) groups[m.supplier]=[];
    groups[m.supplier].push(m);
  });
  var html='';
  Object.keys(groups).forEach(function(s){
    html+='<div class="sec-tt" style="margin-top:8px;">供应商: '+s+' <span style="font-size:11px;color:var(--th);font-weight:400;">采购 · 共'+groups[s].length+'项</span></div>';

      html+='<tr><td style="font-weight:500;">'+m.name+'<span style="display:block;font-size:11px;color:var(--th);">'+m.code+'</span></td>';
      html+='<td>'+m.factory+'</td><td style="color:var(--d);font-weight:500;">'+m.suggest+'</td><td>'+m.qty+'</td>';
      html+='<td><button class="btn btn-sm btn-pri" onclick="event.stopPropagation();handleReplenish(\''+m.code+'\')">生成补货建议</button></td></tr>';

    html+='</tbody></table>';
  });
  var el=document.getElementById('replenishContent');
  if(el)el.innerHTML=html;
}

/* 商品订货建议：按调出工厂→调入工厂维度（调拨） */
function renderReplenishTransfer(){
  var trans=replenishData.filter(function(m){return m.type==='调拨';});
  var groups={};
  trans.forEach(function(m){
    var key=m.outFactory+' → '+m.inFactory;
    if(!groups[key]) groups[key]=[];
    groups[key].push(m);
  });
  var html='';
  Object.keys(groups).forEach(function(key){
    html+='<div class="sec-tt" style="margin-top:8px;">'+key+' <span style="font-size:11px;color:var(--th);font-weight:400;">调拨 · 共'+groups[key].length+'项</span></div>';
    html+='<table class="tbl"><thead><tr><th>商品</th><th>供应商</th><th>建议调拨</th><th>当前库存</th><th>操作</th></tr></thead><tbody>';
    groups[key].forEach(function(m){
      html+='<tr><td style="font-weight:500;">'+m.name+'<span style="display:block;font-size:11px;color:var(--th);">'+m.code+'</span></td>';
      html+='<td>'+m.supplier+'</td>';
      html+='<td style="color:var(--d);font-weight:500;">'+m.suggest+'</td><td>'+m.qty+'</td>';
      html+='<td><button class="btn btn-sm btn-pri" onclick="event.stopPropagation();handleReplenish(\''+m.code+'\')">生成调拨建议</button></td></tr>';

  });

}

/* Order Drawer Tab Switch */
function orderTab(tab){
  var tabs=['region','planner'];
  tabs.forEach(function(t){
    var el=_('#order-tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  var tabEls=document.querySelectorAll('#order-tabs .tab-item');
  var idx=tabs.indexOf(tab);
  tabEls.forEach(function(te,i){
    if(i===idx) te.classList.add('on');
    else te.classList.remove('on');
  });
}

/* Inventory Drawer Tab 切换 */
function invTab(tab){
  var tabs=['purchase','warehouse'];
  tabs.forEach(function(t){
    var el=_('#inv-tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  var tabEls=document.querySelectorAll('#inv-tabs .tab-item');
  var idx=tabs.indexOf(tab);
  tabEls.forEach(function(te,i){
    if(i===idx) te.classList.add('on');
    else te.classList.remove('on');
  });
  if(tab==='purchase') renderInvPurchaseView();
}

/* -- 库存金额代采视图分发 -- */
function renderInvPurchaseView(){
  var container=_('#inv-purchase-content');
  if(!container) return;
  var view=S.inventory.regionView||'tree';
  var purchaseData=[
    {region:'华东区',cities:['上海','杭州','南京']},
    {region:'华南区',cities:['广州','深圳']},
    {region:'华北区',cities:['北京','天津']},
    {region:'西南区',cities:['成都','重庆']},
    {region:'华中区',cities:['武汉']}
  ];
  var h='';
  h+='<div class="view-switch" style="margin-bottom:8px;">';
  h+='<label><input type="radio" name="invPView" value="tree" '+(view==='tree'?'checked':'')+' onchange="switchInvPView(\'tree\')"> 树状层级</label>';
  h+='<label><input type="radio" name="invPView" value="flat-city" '+(view==='flat-city'?'checked':'')+' onchange="switchInvPView(\'flat-city\')"> 仅看城市</label>';

  h+='</div>';
  if(view==='tree'){
    h+=renderInvPTree(purchaseData);
  } else if(view==='flat-city'){
    h+=renderInvPFlatCity(purchaseData);
  } else if(view==='flat-factory'){
    h+=renderInvPFlatFactory(purchaseData);
  }
  container.innerHTML=h;
}

function switchInvPView(mode){
  S.inventory.regionView=mode;

}

/* Turnover Drawer Tab Switch */
function turnoverTab(tab){
  var tabs=['purchase','purchase-warehouse','warehouse'];
  tabs.forEach(function(t){
    var el=_('#turnover-tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  var tabEls=document.querySelectorAll('#turnover-tabs .tab-item');
  var idx=tabs.indexOf(tab);
  tabEls.forEach(function(te,i){
    if(i===idx) te.classList.add('on');
    else te.classList.remove('on');
  });
  /* purchase tab → re-render sub view */
  if(tab==='purchase'){
    renderTurnoverPurchaseView();
  }
  /* purchase-warehouse tab → re-render sub view */
  if(tab==='purchase-warehouse'){
    renderPWView();
  }
}

/* ===== 代采（金额维度）子页签 ===== */
function tpSubTab(sub){
  S.turnoverPurchase.subTab=sub;
  /* update sub-tab active */
  var subTabs=document.querySelectorAll('#tp-sub-tabs .tab-item');
  var subIdx=sub==='region'?0:1;
  subTabs.forEach(function(te,i){
    if(i===subIdx) te.classList.add('on');
    else te.classList.remove('on');
  });
  renderTurnoverPurchaseView();
}

function renderTurnoverPurchaseView(){
  var container=_('#tp-content');
  if(!container) return;
  var sub=S.turnoverPurchase.subTab;
  if(sub==='region'){
    renderTPRegionView(container);
  } else if(sub==='planner'){
    renderTPPlannerView(container);
  }
}

function todoToggleGroup(gid){
  var rows=document.querySelectorAll('.'+gid+'-child');
  var arrow=document.getElementById(gid+'-arrow');
  var expanded=rows.length>0&&rows[0].style.display!=='none';
  rows.forEach(function(r){r.style.display=expanded?'none':'table-row';});
  if(arrow){arrow.style.transform=expanded?'rotate(0deg)':'rotate(90deg)';}
}

function todoExpandAll(prefix){
  var idx=0;
  while(true){
    var rows=document.querySelectorAll('.'+prefix+idx+'-child');
    var arrow=document.getElementById(prefix+idx+'-arrow');
    if(rows.length===0)break;
    rows.forEach(function(r){r.style.display='table-row';});
    if(arrow){arrow.style.transform='rotate(90deg)';}
    idx++;
  }
}

function todoCollapseAll(prefix){
  var idx=0;
  while(true){
    var rows=document.querySelectorAll('.'+prefix+idx+'-child');
    var arrow=document.getElementById(prefix+idx+'-arrow');
    if(rows.length===0)break;
    rows.forEach(function(r){r.style.display='none';});
    if(arrow){arrow.style.transform='rotate(0deg)';}
    idx++;
  }
}

function todoRateTab(tab){
  document.getElementById('todo-tab-daily').style.display=tab==='daily'?'block':'none';
  document.getElementById('todo-tab-monthly').style.display=tab==='monthly'?'block':'none';
  var tabs=document.querySelectorAll('#todo-tabs .tab-item');
  tabs[0].classList.toggle('on',tab==='daily');
  tabs[1].classList.toggle('on',tab==='monthly');
}

    pTotal+=pSPU;
    var pPct=(pSPU/totalSpu*100).toFixed(1);
    h+='<tr class="planner-tree-row" onclick="togglePlannerFactory('+pi+')">';
    h+='<td><span id="pln-arrow-'+pi+'" class="tree-arrow">▶</span> <strong>'+pn+'</strong></td>';
    h+='<td><strong>'+pSPU.toLocaleString()+'</strong></td><td>'+pPct+'%</td></tr>';
    fd.forEach(function(f, fi){
      var fPct=(f['物料数']/totalSpu*100).toFixed(1);
      h+='<tr class="planner-factory-row pln-factory-'+pi+'">';
      h+='<td>'+f['工厂']+'</td><td>'+f['物料数'].toLocaleString()+'</td><td>'+fPct+'%</td></tr>';
    });
  });
  h+='<tr style="background:var(--pl);font-weight:500;"><td>合计（'+plannerNames.length+'人）</td><td>'+pTotal.toLocaleString()+'</td><td>'+(pTotal/totalSpu*100).toFixed(1)+'%</td></tr>';
  h+='</tbody></table>';
  h+='</div>';

  /* ---- Tab 3: 客户维度 — 按客户汇总，可展开工厂 ---- */
  h+='<div id="spu-tab-customer" class="spu-section" style="display:none;">';
  h+='<div id="spu-customer-content"></div>';
  h+='</div>';

  return h;
}

/* SPU Drawer Tab Switch */
function spuTab(tab){
  var tabs=['city','planner','customer'];
  tabs.forEach(function(t){
    var el=_('#spu-tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  /* update tab active state */
  var tabEls=document.querySelectorAll('#spu-tabs .tab-item');
  var idx=tabs.indexOf(tab);
  tabEls.forEach(function(te,i){
    if(i===idx) te.classList.add('on');
    else te.classList.remove('on');
  });
  /* render content based on selected tab */
  if(tab==='city'){
    renderSPUCityTable();
  } else if(tab==='customer'){
    renderSPUCustomerTable();
  }
}

/* ===== 城市维度：城市→工厂展开 + 物料数 + 环比 ===== */
function renderSPUCityTable(){
  var d=DB.spuAnalysis;
  var totalSpu=parseInt(d.total.replace(/,/g,''))||12856;
  var container=_('#spu-city-content');
  if(!container) return;

  var allCities=[];
  REGION_MAP.forEach(function(region){
    region.cities.forEach(function(cn){
      var fd=FACTORY.spuCity[cn]||[];
      var cSPU=0, cMomW=0;
      fd.forEach(function(f){
        cSPU+=f['物料数'];
        cMomW+=f['物料数']*f['环比'];
      });
      var cMom=(cSPU>0?(cMomW/cSPU):0);
      allCities.push({name:cn,region:region.name,spu:cSPU,mom:cMom,factories:fd});
    });
  });
  allCities.sort(function(a,b){return b.spu-a.spu;});

  var grandTotal=allCities.reduce(function(s,c){return s+c.spu;},0);
  var grandMomW=allCities.reduce(function(s,c){return s+c.spu*c.mom;},0);
  var grandMom=(grandTotal>0?(grandMomW/grandTotal):0);
  var grandDir=grandMom>=0?'↑':'↓';

  var h='';
  h+='<div class="sec-tt" style="display:flex;justify-content:space-between;align-items:center;"><span>城市维度 — 物料数 &amp; 环比</span>';
  h+='<span><button class="btn btn-ghost btn-sm" onclick="toggleAllSpuCity(true)">一键展开</button> <button class="btn btn-ghost btn-sm" onclick="toggleAllSpuCity(false)">一键收起</button></span></div>';

  /* 合并行：总计 */
  h+='<table class="tbl" style="margin-bottom:0;"><thead><tr><th>城市</th><th style="text-align:right;">物料数</th><th style="text-align:right;">环比</th></tr></thead><tbody>';
  h+='<tr style="background:var(--g50);font-weight:700;"><td>总计（'+allCities.length+'城）</td><td style="text-align:right;">'+grandTotal.toLocaleString()+'</td><td style="text-align:right;color:'+(grandMom>=0?'var(--d)':'var(--s)')+';">环比 '+grandMom.toFixed(1)+'% '+grandDir+'</td></tr>';

  allCities.forEach(function(c, ci){
    var dir=c.mom>=0?'↑':'↓';
    var momColor=c.mom>=0?'var(--d)':'var(--s)';
    h+='<tr class="spu-city-row" onclick="toggleSpuCity('+ci+')" style="font-weight:500;">';
    h+='<td><span id="spuc-arrow-'+ci+'" class="tree-arrow">▶</span> <strong>'+c.name+'</strong><span class="region-tag">'+c.region+'</span></td>';
    h+='<td style="text-align:right;"><strong>'+c.spu.toLocaleString()+'</strong></td>';
    h+='<td style="text-align:right;color:'+momColor+';">环比 '+Math.abs(c.mom).toFixed(1)+'% '+dir+'</td></tr>';

    /* 工厂子行 */
    c.factories.forEach(function(f){
      var fMom=f['环比']||0;
      var fDir=fMom>=0?'↑':'↓';
      var fMomColor=fMom>=0?'var(--d)':'var(--s)';
      h+='<tr class="spu-city-factory spu-cf-'+ci+'" style="display:none;">';
      h+='<td style="padding-left:36px;">'+f['工厂']+'</td>';
      h+='<td style="text-align:right;">'+f['物料数'].toLocaleString()+'</td>';
      h+='<td style="text-align:right;color:'+fMomColor+';">环比 '+Math.abs(fMom).toFixed(1)+'% '+fDir+'</td></tr>';
    });
  });
  h+='</tbody></table>';
  container.innerHTML=h;
}

function getPerfWeightDefs(){

  return [
    {key:'todo',name:'待办完成率',weight:ws.todo,desc:'任务闭环与超期控制'},
    {key:'outstock',name:'缺货控制',weight:ws.outstock,desc:'缺货率越低得分越高'},
    {key:'turnover',name:'周转效率',weight:ws.turnover,desc:'周转天数达标情况'},
    {key:'risk',name:'风险处置',weight:ws.risk,desc:'呆滞金额与临期SKU控制'},
    {key:'base',name:'过程质量',weight:ws.base,desc:'综合过程评分'}
  ];
}
function openPerfWeightModal(){
  var defs=getPerfWeightDefs();
  var total=defs.reduce(function(s,w){return s+(Number(w.weight)||0);},0);
  var body='<div class="weight-modal-note '+(total===100?'':'red')+'">当前合计 '+total+'%，建议保持 100%。</div>';
  defs.forEach(function(w){
    body+='<div class="weight-row modal-weight-row"><div><strong>'+w.name+'</strong><span>'+w.desc+'</span></div><label>权重 <input id="perf-weight-'+w.key+'" type="number" min="0" max="100" value="'+w.weight+'">%</label></div>';
  });
  showModal('综合排名权重配置',body,function(){
    var next={};
    defs.forEach(function(w){
      var el=_('#perf-weight-'+w.key);
      next[w.key]=el?Number(el.value)||0:0;
    });
    S.supervisor.perfWeights=next;
    renderMain();
    toast('综合排名权重配置已保存','s');
  },'保存配置');
}

/* 工厂维度通用展开/折叠函数 */
function factoryToggle(gid){
  var rows=document.querySelectorAll('.'+gid+'-factory');
  var arrow=document.getElementById(gid+'-farrow');
  var expanded=rows.length>0&&rows[0].style.display!=='none';
  rows.forEach(function(r){r.style.display=expanded?'none':'table-row';});
  if(arrow){arrow.style.transform=expanded?'rotate(0deg)':'rotate(90deg)';}
}
function factoryExpandAll(prefix){
  var idx=0;
  while(true){
    var rows=document.querySelectorAll('.'+prefix+idx+'-factory');
    var arrow=document.getElementById(prefix+idx+'-farrow');
    if(rows.length===0)break;
    rows.forEach(function(r){r.style.display='table-row';});
    if(arrow){arrow.style.transform='rotate(90deg)';}
    idx++;
  }
}
function factoryCollapseAll(prefix){
  var idx=0;
  while(true){
    var rows=document.querySelectorAll('.'+prefix+idx+'-factory');
    var arrow=document.getElementById(prefix+idx+'-farrow');
    if(rows.length===0)break;
    rows.forEach(function(r){r.style.display='none';});
    if(arrow){arrow.style.transform='rotate(0deg)';}
    idx++;
  }
}

/* ===== INIT ===== */
function init(){
  var hash=window.location.hash.replace('#','');
  if(hash&&hash.match(/^(planner|leader|supervisor)/)){
    S.role=hash.split('_')[0];
    var parts=hash.split('_');
    if(parts[1]==='turnover'&&parts[2]){S.planner.turnover.drill=JSON.parse(decodeURIComponent(parts[2]));}
    if(parts[1]==='kpiDrill'&&parts[2]){S.planner.kpiDrill=parts[2];}
  }
  $$('.tb-role').forEach(function(e){e.classList.toggle('on',e.id==='role-'+S.role);});
  renderMain();
}
window.addEventListener('hashchange',function(){
  var hash=window.location.hash.replace('#','');
  if(!hash)return;
  S.role=hash.split('_')[0]||'planner';
  $$('.tb-role').forEach(function(e){e.classList.toggle('on',e.id==='role-'+S.role);});
  renderMain();
});


init();
